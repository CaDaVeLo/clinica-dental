<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservar Cita - Clínica Dental</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
 
    <nav>
        <a href="index.html">Inicio</a>
        <a href="servicios.html">Servicios</a>
        <a href="mis-citas.html">Mis citas</a>
        <a href="contacto.html">Contacto</a>
        <a href="agenda-paciente.html" class="btn-reservar">Reservar Cita</a>
    </nav>
 
    <div class="contenedor-agenda">
        <div class="panel-izquierdo">
            <h2>Agenda tu cita</h2>
            <p class="subtitulo">4 pasos rápidos, sin llamadas</p>
            <div class="ventaja"><strong>Confirmación inmediata</strong><span>Email y SMS al instante</span></div>
            <div class="ventaja"><strong>Cancela fácil</strong><span>Hasta 24 horas antes</span></div>
            <div class="ventaja"><strong>100% seguro</strong><span>Información protegida</span></div>
            <div class="ventaja"><strong>Flexible</strong><span>Efectivo o tarjeta</span></div>
        </div>
 
        <div class="panel-derecho">
            <div class="pasos">
                <div class="paso activo">Paciente</div>
                <div class="paso">Servicio</div>
                <div class="paso">Fecha y hora</div>
                <div class="paso">Pago</div>
            </div>
 
            <h3>Datos del paciente</h3>
 
            <div id="mensaje-error" style="color:red; margin-bottom:10px; display:none;"></div>
 
            <div class="fila-form">
                <div class="campo">
                    <label>Nombre completo *</label>
                    <input type="text" id="nombre" placeholder="Carlos Velarde">
                </div>
                <div class="campo">
                    <label>CURP *</label>
                    <input type="text" id="curp" placeholder="VERCMHSLLPRA301">
                </div>
            </div>
 
            <div class="fila-form">
                <div class="campo">
                    <label>Correo electrónico *</label>
                    <input type="email" id="email" placeholder="correo@gmail.com">
                </div>
                <div class="campo">
                    <label>Teléfono *</label>
                    <input type="tel" id="telefono" placeholder="6657325525">
                </div>
            </div>
 
            <button class="btn-siguiente" onclick="siguiente()">Siguiente: Elegir servicio</button>
        </div>
    </div>
 
    <script src="js/agenda-paciente.js"></script>
</body>
</html>
