<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Citas - Clínica Dental</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <nav>
        <a href="index.html">Inicio</a>
        <a href="servicios.html">Servicios</a>
        <a href="mis-citas.html" class="activo">Mis citas</a>
        <a href="contacto.html">Contacto</a>
        <a href="agenda-paciente.html" class="btn-reservar">Reservar Cita</a>
    </nav>

    <div class="mis-citas-pagina">
        <p class="etiqueta-seccion">GESTIÓN</p>
        <h1 class="titulo-pagina">Mis <span>Citas</span></h1>
        <p class="subtitulo-pagina">Busca con tu email o CURP para ver tus citas.</p>

        <div class="buscador">
            <!-- id="buscador-input" — mis-citas.js lee el valor al buscar -->
            <input id="buscador-input" type="text" placeholder="Tu@email.com ó CURP">
            <!-- id="btn-buscar" — mis-citas.js escucha el clic aquí -->
            <button id="btn-buscar">Buscar</button>
        </div>

        <!-- id="error-busqueda" — mis-citas.js muestra aquí si no encuentra al paciente -->
        <p id="error-busqueda" class="error" style="display:none"></p>

        <!-- id="conteo-citas" — mis-citas.js escribe aquí "3 citas encontradas" -->
        <p id="conteo-citas" class="conteo-citas"></p>

        <!-- id="lista-citas" — mis-citas.js inyecta aquí las tarjetas de cada cita -->
        <div id="lista-citas"></div>

        <br>
        <div style="text-align: center;">
            <a href="agenda-paciente.html" class="btn-siguiente">Agendar Nueva Cita</a>
        </div>
    </div>

    <script type="module" src="js/mis-citas.js"></script>
</body>
</html>
