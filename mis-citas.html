<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Citas - Clínica Dental</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
 
    <nav class="navbar">
            <a href="index.html" class="navbar-logo">Clínica Dental</a>

        <div class="navbar-links">
            <a href="servicios.html">Servicios</a>
            <a href="mis-citas.html">Mis citas</a>
            <a href="contacto.html">Contacto</a>
            <a href="agenda-paciente.html" class="btn-reservar">Reservar Cita</a>
        </div>
    </nav>
 
    <div class="mis-citas-pagina">
        <p class="etiqueta-seccion">GESTIÓN</p>
        <h1 class="titulo-pagina">Mis <span>Citas</span></h1>
        <p class="subtitulo-pagina">Busca con tu email o CURP para ver tus citas.</p>
 
        <div class="buscador">
            <input type="text" id="input-buscar" placeholder="Tu@email.com ó CURP">
            <button onclick="buscar()">Buscar</button>
        </div>
 
        <div id="resultado"></div>
 
        <br>
        <div style="text-align: center;">
            <a href="agenda-paciente.html" class="btn-siguiente">Agendar Nueva Cita</a>
        </div>
    </div>
 
    <!-- MODAL REPROGRAMAR -->
    <div id="modal-reprogramar" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:1000; align-items:center; justify-content:center;">
        <div style="background:white; border-radius:16px; padding:32px; max-width:480px; width:90%; max-height:90vh; overflow-y:auto;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h3 style="font-size:18px; font-weight:700; color:#111;">Reprogramar cita</h3>
                <button onclick="cerrarReprogramar()" style="background:none; border:none; font-size:18px; cursor:pointer; color:#6b7280;">✕</button>
            </div>
            <div style="margin-bottom:16px;">
                <label style="display:block; font-size:14px; font-weight:600; margin-bottom:6px;">Selecciona una nueva fecha</label>
                <input type="date" id="rep-fecha" onchange="buscarSlots()" style="width:100%; border:1px solid #d1d5db; border-radius:8px; padding:10px 14px; font-size:14px; box-sizing:border-box;">
            </div>
            <div id="rep-slots" style="margin-bottom:20px;"></div>
            <input type="hidden" id="rep-slot-sel">
            <input type="hidden" id="rep-doctor-sel">
            <div style="display:flex; gap:12px;">
                <button onclick="confirmarReprogramar()" class="btn-siguiente" style="flex:1;">Confirmar</button>
                <button onclick="cerrarReprogramar()" class="btn-atras" style="flex:1;">Cancelar</button>
            </div>
        </div>
    </div>

    <script src="js/mis-citas.js"></script>
</body>
</html>
