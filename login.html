<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Clínica Dental</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body style="background:#f3f4f6; display:flex; align-items:center; justify-content:center; min-height:100vh;">
 
    <div style="background:#fff; border-radius:16px; padding:40px; width:100%; max-width:420px; border:1px solid #e5e7eb;">
        <h2 style="font-size:24px; font-weight:700; margin-bottom:6px;">Iniciar sesión</h2>
        <p style="color:#666; font-size:14px; margin-bottom:28px;">Accede a tu panel de trabajo</p>
 
        <div id="mensaje-error" style="color:red; margin-bottom:14px; display:none; font-size:14px;"></div>
 
        <div class="campo" style="margin-bottom:14px;">
            <label>Correo electrónico</label>
            <input type="email" id="email" placeholder="correo@clinica.com">
        </div>
 
        <div class="campo" style="margin-bottom:24px;">
            <label>Contraseña</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>
 
        <button class="btn-siguiente" style="width:100%; text-align:center;" onclick="login()">Entrar</button>
    </div>
 
    <script src="js/login.js"></script>
</body>
</html>
